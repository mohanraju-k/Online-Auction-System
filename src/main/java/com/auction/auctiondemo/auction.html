<!DOCTYPE html>
<html>
<head>
  <title>Auction Demo</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    input, select, button {
      padding: 10px;
      margin: 5px;
      width: 90%;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }
  </style>

</head>
<body>

<div class="box">

  <h2>📱 iPhone 14 Auction</h2>
  <h3>⏳ Time Left: <span id="timer">60</span> sec</h3>
  <h3>Current Bid: ₹<span id="bid">Loading...</span></h3>

  <!-- User Selection -->
  <select id="user">
    <option>User1</option>
    <option>User2</option>
    <option>User3</option>
    <option>User4</option>
    <option>User5</option>
  </select>

  <!-- Bid Input -->
  <input type="number" id="amount" placeholder="Enter bid amount">

  <button onclick="placeBid()">Place Bid</button>

  <p id="msg"></p>
  <h4>📊 Bid History</h4>
<ul id="history"></ul>

</div>

<script>

async function loadItem() {
  let res = await fetch("http://localhost:8080/item");
  let data = await res.json();

  document.getElementById("bid").innerText = data.currentBid;
}

async function placeBid() {
if (timeLeft <= 0) {
  document.getElementById("msg").innerText = "Auction closed!";
  return;
}
  let amount = document.getElementById("amount").value;
  let user = document.getElementById("user").value;

  let res = await fetch(`http://localhost:8080/bid?user=${user}&amount=${amount}`, {
    method: "POST"
  });

  let msg = await res.text();

  document.getElementById("msg").innerText = user + ": " + msg;
  if (msg.toLowerCase().includes("success")) {
  addHistory(user, amount);
}

  loadItem();
}

window.onload = loadItem;
let timeLeft = 300; // 5 minutes

let timer = setInterval(() => {

  if (timeLeft <= 0) {
    clearInterval(timer);
    document.getElementById("timer").innerText = "0:00";
    document.getElementById("msg").innerText = "Auction Ended!";
    return;
  }

  let minutes = Math.floor(timeLeft / 60);
  let seconds = timeLeft % 60;

  // format like 5:00, 4:59...
  seconds = seconds < 10 ? "0" + seconds : seconds;

  document.getElementById("timer").innerText = minutes + ":" + seconds;

  timeLeft--;

}, 1000);
function addHistory(user, amount) {
  let li = document.createElement("li");
  li.innerText = user + " bid ₹" + amount;
  document.getElementById("history").appendChild(li);
}

</script>

</body>
</html>
